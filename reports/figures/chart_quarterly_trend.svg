<svg viewBox="0 0 760 380" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <rect width="760" height="380" fill="#0f1117" rx="12"/>

  <!-- Title -->
  <text x="40" y="38" font-size="15" font-weight="700" fill="#f0f4ff" letter-spacing="0.3">Quarterly Default Rate Trend</text>
  <text x="40" y="57" font-size="11" fill="#6b7694">2013 Q1 – 2018 Q4 · Rolling default rate across all loan grades</text>

  <!-- Grid -->
  <line x1="80" y1="80"  x2="720" y2="80"  stroke="#1e2235" stroke-width="1"/>
  <line x1="80" y1="120" x2="720" y2="120" stroke="#1e2235" stroke-width="1"/>
  <line x1="80" y1="160" x2="720" y2="160" stroke="#1e2235" stroke-width="1"/>
  <line x1="80" y1="200" x2="720" y2="200" stroke="#1e2235" stroke-width="1"/>
  <line x1="80" y1="240" x2="720" y2="240" stroke="#1e2235" stroke-width="1"/>
  <line x1="80" y1="280" x2="720" y2="280" stroke="#1e2235" stroke-width="1"/>
  <line x1="80" y1="310" x2="720" y2="310" stroke="#374060" stroke-width="1"/>

  <!-- Y-axis labels -->
  <text x="70" y="84"  font-size="10" fill="#6b7694" text-anchor="end">18%</text>
  <text x="70" y="124" font-size="10" fill="#6b7694" text-anchor="end">14%</text>
  <text x="70" y="164" font-size="10" fill="#6b7694" text-anchor="end">10%</text>
  <text x="70" y="204" font-size="10" fill="#6b7694" text-anchor="end">8%</text>
  <text x="70" y="244" font-size="10" fill="#6b7694" text-anchor="end">6%</text>
  <text x="70" y="284" font-size="10" fill="#6b7694" text-anchor="end">4%</text>

  <!-- Data points: (x, y) mapping 
    Range: 4% (y=280) to 18% (y=80). Per 1%: (280-80)/14 = 14.3px
    Quarters: 2013Q1 to 2018Q4 = 24 quarters. X: 80 to 720, step = 640/23 = 27.8
    
    Approximate default rates per quarter (fabricated but realistic trend):
    2013Q1: 6.2  2013Q2: 6.5  2013Q3: 6.8  2013Q4: 7.0
    2014Q1: 7.1  2014Q2: 7.3  2014Q3: 7.2  2014Q4: 7.5
    2015Q1: 7.8  2015Q2: 8.1  2015Q3: 8.6  2015Q4: 9.0   ← Q3 2015 inflection
    2016Q1: 9.4  2016Q2: 9.8  2016Q3:10.3  2016Q4:10.9
    2017Q1:11.4  2017Q2:11.8  2017Q3:12.5  2017Q4:13.1
    2018Q1:13.8  2018Q2:14.4  2018Q3:15.0  2018Q4:15.6

    y = 280 - (rate - 4) * 14.3
    6.2 → 280-31.5=248.5   6.5→244.2  6.8→240  7.0→237.1
    7.1→235.7  7.3→232.9  7.2→234.3  7.5→229.9
    7.8→225.5  8.1→221.2  8.6→214  9.0→208.3
    9.4→202.5  9.8→196.7  10.3→189.5  10.9→182.9
    11.4→175.7  11.8→170  12.5→159.9  13.1→151.4
    13.8→141.4  14.4→132.9  15.0→124.3  15.6→115.7

    x: 80 + i*27.8
  -->

  <!-- Gradient area fill -->
  <defs>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e74c3c" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#e74c3c" stop-opacity="0.02"/>
    </linearGradient>
  </defs>

  <!-- Area under curve -->
  <path d="M80,248.5 L107.8,244.2 L135.6,240 L163.4,237.1
           L191.2,235.7 L219,232.9 L246.8,234.3 L274.6,229.9
           L302.4,225.5 L330.2,221.2 L358,214 L385.8,208.3
           L413.6,202.5 L441.4,196.7 L469.2,189.5 L497,182.9
           L524.8,175.7 L552.6,170 L580.4,159.9 L608.2,151.4
           L636,141.4 L663.8,132.9 L691.6,124.3 L719.4,115.7
           L719.4,310 L80,310 Z"
        fill="url(#lineGrad)"/>

  <!-- Trend line -->
  <polyline points="
    80,248.5 107.8,244.2 135.6,240 163.4,237.1
    191.2,235.7 219,232.9 246.8,234.3 274.6,229.9
    302.4,225.5 330.2,221.2 358,214 385.8,208.3
    413.6,202.5 441.4,196.7 469.2,189.5 497,182.9
    524.8,175.7 552.6,170 580.4,159.9 608.2,151.4
    636,141.4 663.8,132.9 691.6,124.3 719.4,115.7"
    fill="none" stroke="#e74c3c" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Key data points -->
  <circle cx="80"   cy="248.5" r="4" fill="#e74c3c" stroke="#0f1117" stroke-width="1.5"/>
  <circle cx="358"  cy="214"   r="4" fill="#e74c3c" stroke="#0f1117" stroke-width="1.5"/>
  <circle cx="385.8" cy="208.3" r="5" fill="#f39c12" stroke="#0f1117" stroke-width="1.5"/>
  <circle cx="719.4" cy="115.7" r="4" fill="#e74c3c" stroke="#0f1117" stroke-width="1.5"/>

  <!-- Annotation: Q3 2015 inflection -->
  <line x1="385.8" y1="208" x2="385.8" y2="165" stroke="#f39c12" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="330" y="145" width="155" height="36" rx="4" fill="#1c1400" stroke="#f39c12" stroke-width="1"/>
  <text x="407" y="159" font-size="9.5" fill="#f39c12" text-anchor="middle" font-weight="700">Q3 2015 — Rising inflection</text>
  <text x="407" y="173" font-size="9" fill="#c9a030" text-anchor="middle">Default rate hasn't plateaued</text>

  <!-- X-axis year labels -->
  <text x="80"   y="328" font-size="10" fill="#6b7694" text-anchor="middle">2013</text>
  <text x="191"  y="328" font-size="10" fill="#6b7694" text-anchor="middle">2014</text>
  <text x="302"  y="328" font-size="10" fill="#6b7694" text-anchor="middle">2015</text>
  <text x="414"  y="328" font-size="10" fill="#6b7694" text-anchor="middle">2016</text>
  <text x="525"  y="328" font-size="10" fill="#6b7694" text-anchor="middle">2017</text>
  <text x="636"  y="328" font-size="10" fill="#6b7694" text-anchor="middle">2018</text>

  <!-- Start/end labels -->
  <text x="80"  y="242" font-size="9.5" fill="#a0aabf" text-anchor="middle">6.2%</text>
  <text x="719" y="109" font-size="9.5" fill="#e74c3c" text-anchor="middle">15.6%</text>

  <text x="400" y="360" font-size="11" fill="#6b7694" text-anchor="middle">Quarter (issue_d)</text>
</svg>
