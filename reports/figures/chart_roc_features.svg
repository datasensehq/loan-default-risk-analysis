<svg viewBox="0 0 760 400" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <rect width="760" height="400" fill="#0f1117" rx="12"/>

  <!-- Title -->
  <text x="40" y="38" font-size="15" font-weight="700" fill="#f0f4ff" letter-spacing="0.3">Risk Model — ROC Curve &amp; Feature Importance</text>
  <text x="40" y="57" font-size="11" fill="#6b7694">Logistic Regression · 80/20 stratified split · class_weight='balanced'</text>

  <!-- === LEFT: ROC Curve === -->
  <!-- Axes: origin (80, 320), width 260, height 240 -->
  <!-- X = FPR 0→1, Y = TPR 0→1, area fill under curve -->

  <line x1="80" y1="80" x2="80" y2="320" stroke="#374060" stroke-width="1.5"/>
  <line x1="80" y1="320" x2="340" y2="320" stroke="#374060" stroke-width="1.5"/>

  <!-- Grid -->
  <line x1="80"  y1="272" x2="340" y2="272" stroke="#1e2235" stroke-width="1"/>
  <line x1="80"  y1="224" x2="340" y2="224" stroke="#1e2235" stroke-width="1"/>
  <line x1="80"  y1="176" x2="340" y2="176" stroke="#1e2235" stroke-width="1"/>
  <line x1="80"  y1="128" x2="340" y2="128" stroke="#1e2235" stroke-width="1"/>
  <line x1="80"  y1="80"  x2="340" y2="80"  stroke="#1e2235" stroke-width="1"/>
  <line x1="145" y1="80"  x2="145" y2="320" stroke="#1e2235" stroke-width="1"/>
  <line x1="210" y1="80"  x2="210" y2="320" stroke="#1e2235" stroke-width="1"/>
  <line x1="275" y1="80"  x2="275" y2="320" stroke="#1e2235" stroke-width="1"/>

  <!-- Axis labels -->
  <text x="70" y="324" font-size="9.5" fill="#6b7694" text-anchor="end">0.0</text>
  <text x="70" y="276" font-size="9.5" fill="#6b7694" text-anchor="end">0.2</text>
  <text x="70" y="228" font-size="9.5" fill="#6b7694" text-anchor="end">0.4</text>
  <text x="70" y="180" font-size="9.5" fill="#6b7694" text-anchor="end">0.6</text>
  <text x="70" y="132" font-size="9.5" fill="#6b7694" text-anchor="end">0.8</text>
  <text x="70" y="84"  font-size="9.5" fill="#6b7694" text-anchor="end">1.0</text>

  <text x="80"  y="336" font-size="9.5" fill="#6b7694" text-anchor="middle">0.0</text>
  <text x="145" y="336" font-size="9.5" fill="#6b7694" text-anchor="middle">0.25</text>
  <text x="210" y="336" font-size="9.5" fill="#6b7694" text-anchor="middle">0.5</text>
  <text x="275" y="336" font-size="9.5" fill="#6b7694" text-anchor="middle">0.75</text>
  <text x="340" y="336" font-size="9.5" fill="#6b7694" text-anchor="middle">1.0</text>

  <text x="50" y="200" font-size="10" fill="#6b7694" transform="rotate(-90,50,200)">True Positive Rate</text>
  <text x="210" y="355" font-size="10" fill="#6b7694" text-anchor="middle">False Positive Rate</text>

  <!-- Random diagonal -->
  <line x1="80" y1="320" x2="340" y2="80" stroke="#374060" stroke-width="1.2" stroke-dasharray="5,4"/>

  <!-- ROC curve (AUC ≈ 0.70)
    FPR: 0→1 mapped to x: 80→340 (per 1: 260px)
    TPR: 0→1 mapped to y: 320→80 (per 1: 240px)
    Representative points for AUC~0.70:
    (0,0) (0.05,0.25) (0.1,0.42) (0.2,0.58) (0.3,0.68) (0.4,0.75) (0.5,0.80) (0.6,0.85) (0.7,0.88) (0.8,0.91) (0.9,0.95) (1,1)
    x=80+fpr*260, y=320-tpr*240
  -->
  <defs>
    <linearGradient id="rocGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3498db" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#3498db" stop-opacity="0.0"/>
    </linearGradient>
  </defs>

  <path d="M80,320 C93,260 106,218.8 106,218.8 L132,181.2 L158,157.2 L184,140 L210,128 L236,116 L262,108 L288,101.6 L314,92 L340,80 L340,320 Z"
        fill="url(#rocGrad)"/>
  <path d="M80,320 C93,260 106,218.8 106,218.8 L132,181.2 L158,157.2 L184,140 L210,128 L236,116 L262,108 L288,101.6 L314,92 L340,80"
        fill="none" stroke="#3498db" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- AUC label -->
  <rect x="155" y="220" width="110" height="30" rx="5" fill="#0d1a2e" stroke="#3498db" stroke-width="1"/>
  <text x="210" y="233" font-size="10" fill="#3498db" text-anchor="middle" font-weight="700">AUC = 0.70</text>
  <text x="210" y="245" font-size="9" fill="#6b7694" text-anchor="middle">ROC curve</text>

  <!-- === RIGHT: Feature Importance === -->
  <!-- x from 390 to 720, horizontal bars -->
  <text x="390" y="82" font-size="12" fill="#f0f4ff" font-weight="700">Feature Importance</text>
  <text x="390" y="96" font-size="10" fill="#6b7694">Logistic regression coefficients (normalized)</text>

  <line x1="390" y1="108" x2="720" y2="108" stroke="#1e2235" stroke-width="1"/>

  <!-- Features: bar from 390, max width=280 at 1.0
    int_rate: 0.82 → 229.6
    loan_to_income: 0.76 → 212.8
    grade_num: 0.71 → 198.8
    dti: 0.64 → 179.2
    loan_amnt: 0.48 → 134.4
    annual_inc: 0.39 → 109.2
  -->
  <defs>
    <linearGradient id="fBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#9b59b6"/>
      <stop offset="100%" stop-color="#6a2d8f" stop-opacity="0.8"/>
    </linearGradient>
  </defs>

  <!-- int_rate 0.82 -->
  <text x="500" y="125" font-size="10" fill="#c9d0e8" text-anchor="end">int_rate</text>
  <rect x="505" y="113" width="229.6" height="18" rx="3" fill="url(#fBar)"/>
  <text x="740" y="126" font-size="10" fill="#b07cc6">0.82</text>

  <!-- loan_to_income 0.76 -->
  <text x="500" y="150" font-size="10" fill="#c9d0e8" text-anchor="end">loan_to_income</text>
  <rect x="505" y="138" width="212.8" height="18" rx="3" fill="url(#fBar)"/>
  <text x="723" y="151" font-size="10" fill="#b07cc6">0.76</text>

  <!-- grade_num 0.71 -->
  <text x="500" y="175" font-size="10" fill="#c9d0e8" text-anchor="end">grade_num</text>
  <rect x="505" y="163" width="198.8" height="18" rx="3" fill="url(#fBar)"/>
  <text x="710" y="176" font-size="10" fill="#b07cc6">0.71</text>

  <!-- dti 0.64 -->
  <text x="500" y="200" font-size="10" fill="#c9d0e8" text-anchor="end">dti</text>
  <rect x="505" y="188" width="179.2" height="18" rx="3" fill="url(#fBar)"/>
  <text x="690" y="201" font-size="10" fill="#b07cc6">0.64</text>

  <!-- loan_amnt 0.48 -->
  <text x="500" y="225" font-size="10" fill="#c9d0e8" text-anchor="end">loan_amnt</text>
  <rect x="505" y="213" width="134.4" height="18" rx="3" fill="url(#fBar)"/>
  <text x="645" y="226" font-size="10" fill="#b07cc6">0.48</text>

  <!-- annual_inc 0.39 -->
  <text x="500" y="250" font-size="10" fill="#c9d0e8" text-anchor="end">annual_inc</text>
  <rect x="505" y="238" width="109.2" height="18" rx="3" fill="url(#fBar)"/>
  <text x="620" y="251" font-size="10" fill="#b07cc6">0.39</text>

  <!-- Metrics cards -->
  <rect x="390" y="278" width="145" height="70" rx="6" fill="#141b2d" stroke="#1e2b44" stroke-width="1"/>
  <text x="462" y="298" font-size="10" fill="#6b7694" text-anchor="middle">ROC-AUC</text>
  <text x="462" y="324" font-size="22" font-weight="800" fill="#3498db" text-anchor="middle">0.70</text>
  <text x="462" y="341" font-size="9" fill="#6b7694" text-anchor="middle">held-out test set</text>

  <rect x="550" y="278" width="145" height="70" rx="6" fill="#141b2d" stroke="#1e2b44" stroke-width="1"/>
  <text x="622" y="298" font-size="10" fill="#6b7694" text-anchor="middle">High-Risk Flagged</text>
  <text x="622" y="324" font-size="22" font-weight="800" fill="#e74c3c" text-anchor="middle">18%</text>
  <text x="622" y="341" font-size="9" fill="#6b7694" text-anchor="middle">of total portfolio</text>
</svg>
